<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Hoja de Ruta — SIASA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0E1726;--surface-solid:#172538;--surface-2:#1E3049;--border:#2A3E59;
  --accent:#FF8A3D;--accent-dim:#7a4a26;--accent-ink:#241404;
  --good:#3ECF8E;--bad:#FF6B6B;--warn:#F0C040;
  --text:#EAF1F8;--muted:#8AA0B8;
  --road-dash:repeating-linear-gradient(90deg,var(--accent) 0 18px,transparent 18px 32px);
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{background:radial-gradient(1200px 600px at 50% -10%,#1a2c44 0%,var(--bg) 55%);
  color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:'Barlow Condensed','Inter',sans-serif;font-weight:800;letter-spacing:.01em;margin:0;}
button{font-family:inherit;} .nums{font-variant-numeric:tabular-nums;}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 40px;}
.topbar{padding:22px 20px 16px;}
.road-line{height:3px;background-image:var(--road-dash);background-size:32px 3px;margin-top:10px;border-radius:2px;opacity:.9;}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(155deg,var(--accent),#e0641a);
  display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:800;font-size:18px;color:var(--accent-ink);flex-shrink:0;}
.brand h1{font-size:26px;line-height:1;}
.brand .sub{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:4px;}
main{flex:1;padding:6px 20px 20px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--surface-solid);border:1px solid var(--border);border-radius:16px;padding:20px;}
.card h2{font-size:22px;margin-bottom:4px;} .card .hint{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.5;}
.role-grid{display:grid;gap:12px;margin-top:8px;}
.role-btn{background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:20px 18px;text-align:left;
  color:var(--text);cursor:pointer;display:flex;align-items:center;gap:16px;transition:.12s;}
.role-btn:hover{border-color:var(--accent);background:#23354d;} .role-btn:active{transform:scale(.98);}
.role-btn .icon{width:44px;height:44px;border-radius:12px;background:var(--surface-solid);display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border);}
.role-btn .label{font-family:'Barlow Condensed';font-weight:700;font-size:18px;}
.role-btn .desc{font-size:12px;color:var(--muted);margin-top:2px;}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.field{margin-bottom:13px;}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
  padding:13px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:.12s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
  background-position:calc(100% - 18px) center,calc(100% - 13px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;}
/* Toggle buttons */
.toggle-group{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.toggle-btn{flex:1;background:var(--surface-2);border:none;border-right:1px solid var(--border);color:var(--muted);
  padding:12px 0;font-family:'Barlow Condensed';font-weight:700;font-size:15px;cursor:pointer;transition:.12s;}
.toggle-btn:last-child{border-right:none;}
.toggle-btn.active{background:var(--accent);color:var(--accent-ink);}
.toggle-btn.active-danger{background:#c0392b;color:#fff;}
/* PIN */
.pin-dots{display:flex;justify-content:center;gap:14px;margin:18px 0 22px;}
.pin-dots .dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:.15s;}
.pin-dots .dot.filled{background:var(--accent);border-color:var(--accent);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.keypad button{background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  border-radius:12px;padding:18px 0;font-size:22px;font-family:'Barlow Condensed';font-weight:700;cursor:pointer;}
.keypad button:active{background:var(--accent-dim);} .keypad button.del{font-size:15px;color:var(--muted);}
/* Botones */
.btn{display:block;width:100%;text-align:center;background:var(--accent);color:var(--accent-ink);border:none;
  border-radius:12px;padding:15px 18px;font-family:'Barlow Condensed';font-weight:700;font-size:18px;letter-spacing:.02em;cursor:pointer;}
.btn:active{transform:scale(.99);} .btn:disabled{opacity:.5;cursor:not-allowed;}
.btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn.danger{background:var(--bad);color:#2b0808;}
.btn.good{background:var(--good);color:#082b1a;}
.btn.small{padding:9px 14px;font-size:14px;width:auto;display:inline-block;}
.btn.jt{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;}
.row{display:flex;gap:10px;} .row>*{flex:1;}
/* Topnav */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:6px;}
.back-link{color:var(--muted);font-size:14px;background:none;border:none;cursor:pointer;padding:8px 0;}
.who{font-size:13px;color:var(--muted);} .who b{color:var(--text);}
/* Mensajes */
.msg{font-size:13.5px;padding:10px 12px;border-radius:10px;margin-bottom:12px;line-height:1.4;}
.msg.error{background:#3a1414;color:#ffb3b3;border:1px solid #5a2222;}
.msg.ok{background:#0f3122;color:#9ef0c8;border:1px solid #1f5a3e;}
.msg.info{background:#162a3f;color:#a9c7e0;border:1px solid #234564;}
/* Stats */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.stat .num{font-family:'Barlow Condensed';font-size:26px;font-weight:800;color:var(--accent);}
.stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
/* Badges */
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.badge.pendiente{background:#2a2a10;color:var(--warn);border:1px solid #4a4a20;}
.badge.aprobado{background:#0f3122;color:var(--good);border:1px solid #1f5a3e;}
.badge.rechazado{background:#3a1414;color:var(--bad);border:1px solid #5a2222;}
.badge.ida,.badge.vuelta{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}
.badge.general{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}
.badge.peligrosa{background:#3a2010;color:var(--accent);border:1px solid #5a3820;}
/* Tabs */
.tabbar{display:flex;gap:8px;margin-bottom:4px;}
.tabbar button{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);
  padding:11px 0;border-radius:10px;font-family:'Barlow Condensed';font-weight:700;font-size:15px;cursor:pointer;}
.tabbar button.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
/* Trip cards */
.trip-card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:10px;}
.trip-card .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.trip-card .route{font-family:'Barlow Condensed';font-weight:700;font-size:16px;flex:1;}
.trip-card .km{font-family:'Barlow Condensed';font-weight:800;color:var(--accent);font-size:17px;white-space:nowrap;}
.trip-card .meta{font-size:12px;color:var(--muted);margin-top:4px;}
.trip-card .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.trip-card .obs{font-size:12.5px;color:var(--muted);margin-top:6px;border-top:1px dashed var(--border);padding-top:6px;}
.trip-card .jt-obs{font-size:12px;margin-top:6px;border-top:1px dashed var(--border);padding-top:6px;}
.trip-card .jt-obs.rechazado{color:#ff9999;}
.trip-card .km-row{margin-top:4px;}
.trip-card .km-aprobado{font-size:12px;color:var(--good);}
.trip-card .km-original{font-size:11px;color:var(--muted);text-decoration:line-through;}
/* Choferes */
.chofer-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);
  border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.chofer-row.inactivo{opacity:.5;}
.chofer-row .name{font-family:'Barlow Condensed';font-weight:700;font-size:16px;}
.chofer-row .plate{font-size:12px;color:var(--muted);}
.chofer-row .acts{display:flex;gap:6px;}
.icon-btn{background:var(--surface-solid);border:1px solid var(--border);color:var(--text);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,9,16,.75);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.modal{background:var(--surface-solid);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:22px 20px 32px;width:100%;max-width:480px;}
/* Spinner */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:var(--accent-ink);border-radius:50%;
  display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;color:var(--muted);font-size:13.5px;padding:28px 10px;}
footer{text-align:center;color:#3e5470;font-size:11px;padding:18px 20px 0;}
/* JT panel pending counter */
.pending-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--warn);color:#1a1a00;
  border-radius:50%;width:22px;height:22px;font-size:12px;font-weight:800;margin-left:8px;}
.jt-accent{color:#5dade2;}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
/* ============================================================
   CONFIG
   ============================================================ */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzaHXOZglNNJFRTiGLSCsuc_aJ_7ITuReXyz-FAgWOhAbMpD6aiG89fmqkKg-ismTzn/exec";

/* ============================================================
   ESTADO
   ============================================================ */
const state = {
  screen:'inicio',
  // chofer
  choferes:[], choferSeleccionado:null, pin:'', chofer:null, misViajes:[],
  // admin
  adminToken:null, adminConfigurado:null, adminTab:'viajes',
  viajes:[], choferesAdmin:[], filtroChofer:'', filtroEstado:'todos',
  // jefe de tráfico
  jtToken:null, jtConfigurado:null, viajesPendientes:[],
  // ui
  loading:false, msg:null, modal:null,
};
function setState(p){ Object.assign(state,p); render(); }
function showMsg(type,text){ state.msg={type,text}; render(); }
function clearMsg(){ state.msg=null; }

/* ============================================================
   API
   ============================================================ */
async function api(action, payload={}) {
  const res = await fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action,...payload}),
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error||'Error desconocido');
  return data;
}
async function withLoading(fn){
  setState({loading:true});
  try{ await fn(); } catch(err){ showMsg('error',err.message); }
  finally{ state.loading=false; render(); }
}

/* ============================================================
   UTILIDADES
   ============================================================ */
async function sha256(text){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function fmtFecha(f){ if(!f)return''; const [y,m,d]=String(f).split('-'); return d&&m?`${d}/${m}/${y}`:f; }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================================================
   NAVEGACIÓN
   ============================================================ */
function irInicio(){ clearMsg(); setState({screen:'inicio',pin:'',choferSeleccionado:null}); }

async function irLoginChofer(){
  clearMsg(); setState({screen:'login-chofer',pin:'',choferSeleccionado:null,loading:true});
  try{ const d=await api('getChoferes'); setState({choferes:d.choferes,loading:false}); }
  catch(e){ state.loading=false; showMsg('error',e.message); }
}

async function irLoginAdmin(){
  clearMsg(); setState({screen:'login-admin',loading:true});
  try{ const d=await api('estadoAdmin'); setState({adminConfigurado:d.configurado,loading:false}); }
  catch(e){ state.loading=false; showMsg('error',e.message); }
}

async function irLoginJT(){
  clearMsg(); setState({screen:'login-jt',loading:true});
  try{ const d=await api('estadoJT'); setState({jtConfigurado:d.configurado,loading:false}); }
  catch(e){ state.loading=false; showMsg('error',e.message); }
}

function cerrarSesion(){
  setState({screen:'inicio',chofer:null,adminToken:null,jtToken:null,pin:'',
    choferSeleccionado:null,viajes:[],misViajes:[],viajesPendientes:[]});
}

/* ============================================================
   LOGIN CHOFER
   ============================================================ */
function elegirChofer(c){ clearMsg(); setState({choferSeleccionado:c,pin:''}); }
function pinPress(d){
  if(state.pin.length>=4)return;
  state.pin+=d; render();
  if(state.pin.length===4) intentarLoginChofer();
}
function pinDel(){ state.pin=state.pin.slice(0,-1); render(); }
async function intentarLoginChofer(){
  clearMsg();
  await withLoading(async()=>{
    const pinHash=await sha256(state.pin);
    const d=await api('loginChofer',{choferId:state.choferSeleccionado.id,pinHash});
    setState({chofer:d.chofer,screen:'chofer',pin:'',choferSeleccionado:null});
    await cargarMisViajes();
  });
  if(state.msg?.type==='error') setState({pin:''});
}

/* ============================================================
   PANTALLA CHOFER
   ============================================================ */
async function cargarMisViajes(){
  try{ const d=await api('misViajes',{choferId:state.chofer.id}); setState({misViajes:d.viajes}); }
  catch(e){ showMsg('error',e.message); }
}
async function enviarViaje(form){
  clearMsg();
  const fd=new FormData(form);
  const km=Number(fd.get('km'));
  if(!fd.get('fecha')||!fd.get('origen')||!fd.get('destino')||!km){
    showMsg('error','Completá fecha, origen, destino y kilómetros.'); return;
  }
  await withLoading(async()=>{
    await api('crearViaje',{
      fecha:fd.get('fecha'), choferId:state.chofer.id, choferNombre:state.chofer.nombre,
      patente:fd.get('patente')||state.chofer.patente,
      origen:fd.get('origen'), destino:fd.get('destino'), km,
      observaciones:fd.get('observaciones'), creadoPor:state.chofer.nombre,
      tipoViaje:fd.get('tipo_viaje')||'ida',
      tipoCarga:fd.get('tipo_carga')||'general',
    });
    showMsg('ok','Viaje cargado. Quedará pendiente de aprobación del Jefe de Tráfico.');
    form.reset();
    // Re-attach toggles after reset
    setupToggles(form);
    await cargarMisViajes();
  });
}
function setupToggles(form){
  form.querySelectorAll('.toggle-group').forEach(group=>{
    const name=group.dataset.input;
    group.querySelectorAll('.toggle-btn').forEach(btn=>{
      btn.onclick=()=>{
        group.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active','active-danger'));
        const cls=btn.dataset.cls||'active';
        btn.classList.add(cls);
        form.querySelector(`input[name="${name}"]`).value=btn.dataset.val;
      };
    });
  });
}

/* ============================================================
   LOGIN ADMIN
   ============================================================ */
async function enviarAdminPassword(form,modo){
  clearMsg();
  const fd=new FormData(form);
  const pass=fd.get('password'), pass2=fd.get('password2');
  if(!pass||pass.length<4){showMsg('error','La contraseña debe tener al menos 4 caracteres.');return;}
  if(modo==='crear'&&pass!==pass2){showMsg('error','Las contraseñas no coinciden.');return;}
  await withLoading(async()=>{
    const h=await sha256(pass);
    const d=modo==='crear'?await api('crearPasswordAdmin',{passwordHash:h}):await api('loginAdmin',{passwordHash:h});
    setState({adminToken:d.adminToken,screen:'admin',adminTab:'viajes'});
    await cargarPanelAdmin();
  });
}

/* ============================================================
   PANEL ADMIN
   ============================================================ */
async function cargarPanelAdmin(){
  try{
    const [v,c]=await Promise.all([
      api('listarViajes',{adminToken:state.adminToken,filtroEstado:'todos'}),
      api('listarChoferesAdmin',{adminToken:state.adminToken}),
    ]);
    setState({viajes:v.viajes,choferesAdmin:c.choferes});
  }catch(e){showMsg('error',e.message);}
}
function setAdminTab(tab){ setState({adminTab:tab}); }
function filtrarViajes(){
  let v=state.viajes;
  if(state.filtroChofer) v=v.filter(x=>x.choferId===state.filtroChofer);
  if(state.filtroEstado&&state.filtroEstado!=='todos') v=v.filter(x=>x.estado===state.filtroEstado);
  return v;
}
async function adminEliminarViaje(id){
  state.modal={title:'¿Eliminar viaje?',
    body:'<p style="color:var(--muted);font-size:14px;">Esta acción no se puede deshacer.</p>',
    actions:[
      {label:'Cancelar',cls:'secondary',onClick:cerrarModal},
      {label:'Eliminar',cls:'danger',onClick:async()=>{
        cerrarModal();
        await withLoading(async()=>{await api('eliminarViaje',{adminToken:state.adminToken,viajeId:id}); await cargarPanelAdmin();});
      }},
    ]};
  render();
}
function exportarExcel(){
  const filtrados=filtrarViajes();
  if(!filtrados.length){showMsg('info','No hay viajes para exportar.');return;}
  const filas=filtrados.map(v=>({
    Fecha:fmtFecha(v.fecha), Chofer:v.choferNombre, Patente:v.patente,
    Origen:v.origen, Destino:v.destino,
    'Tipo Viaje':v.tipoViaje, 'Tipo Carga':v.tipoCarga,
    'Km Declarados':v.km, Estado:v.estado,
    'Km Aprobados':v.kmAprobados||'',
    'Obs. JT':v.observacionJT||'',
    Observaciones:v.observaciones,
  }));
  const ws=XLSX.utils.json_to_sheet(filas);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Viajes');
  XLSX.writeFile(wb,`hoja-de-ruta_${new Date().toISOString().slice(0,10)}.xlsx`);
}
// Gestión choferes
function cerrarModal(){ state.modal=null; render(); }
function abrirModalAgregarChofer(){
  state.modal={title:'Nuevo chofer',
    body:`<div class="field"><label>Nombre</label><input id="m-nombre" type="text" placeholder="Nombre y apellido"></div>
          <div class="field"><label>Patente (opcional)</label><input id="m-patente" type="text" placeholder="AB123CD"></div>`,
    actions:[
      {label:'Cancelar',cls:'secondary',onClick:cerrarModal},
      {label:'Crear',cls:'',onClick:async()=>{
        const nombre=document.getElementById('m-nombre').value.trim();
        const patente=document.getElementById('m-patente').value.trim();
        if(!nombre)return;
        cerrarModal();
        await withLoading(async()=>{
          const d=await api('agregarChofer',{adminToken:state.adminToken,nombre,patente});
          await cargarPanelAdmin(); mostrarPinGenerado(d.chofer.nombre,d.chofer.pin);
        });
      }},
    ]};
  render();
}
function mostrarPinGenerado(nombre,pin){
  state.modal={title:'PIN generado',
    body:`<p style="font-size:14px;color:var(--muted);">Anotá este PIN y pasáselo a <b style="color:var(--text)">${esc(nombre)}</b>. No se vuelve a mostrar.</p>
          <div style="text-align:center;font-family:'Barlow Condensed';font-size:40px;font-weight:800;letter-spacing:.15em;color:var(--accent);margin:14px 0;">${pin}</div>`,
    actions:[{label:'Listo',cls:'',onClick:cerrarModal}]};
  render();
}
function abrirModalEditarChofer(c){
  state.modal={title:'Editar chofer',
    body:`<div class="field"><label>Nombre</label><input id="m-nombre" type="text" value="${esc(c.nombre)}"></div>
          <div class="field"><label>Patente</label><input id="m-patente" type="text" value="${esc(c.patente||'')}"></div>`,
    actions:[
      {label:'Cancelar',cls:'secondary',onClick:cerrarModal},
      {label:'Guardar',cls:'',onClick:async()=>{
        const nombre=document.getElementById('m-nombre').value.trim();
        const patente=document.getElementById('m-patente').value.trim();
        if(!nombre)return; cerrarModal();

/* ============================================================
   LOGIN JT
   ============================================================ */
async function enviarJTPassword(form,modo){
  clearMsg();
  const fd=new FormData(form);
  const pass=fd.get('password'),pass2=fd.get('password2');
  if(!pass||pass.length<4){showMsg('error','La contraseña debe tener al menos 4 caracteres.');return;}
  if(modo==='crear'&&pass!==pass2){showMsg('error','Las contraseñas no coinciden.');return;}
  await withLoading(async()=>{
    const h=await sha256(pass);
    const d=modo==='crear'?await api('crearPasswordJT',{passwordHash:h}):await api('loginJT',{passwordHash:h});
    setState({jtToken:d.jtToken,screen:'jt'});
    await cargarViajesPendientes();
  });
}

function renderAdminViajes(){
  const filtrados=filtrarViajes();
  const totalKm=filtrados.reduce((a,v)=>a+Number(v.km||0),0);
  const aprobados=filtrados.filter(v=>v.estado==='aprobado').length;
  const pendientes=filtrados.filter(v=>v.estado==='pendiente').length;

  const statsCard=el(`<div class="card">
    <div class="stat-row">
      <div class="stat"><div class="num nums">${filtrados.length}</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="num nums" style="color:var(--good);">${aprobados}</div><div class="lbl">Aprobados</div></div>
      <div class="stat"><div class="num nums" style="color:var(--warn);">${pendientes}</div><div class="lbl">Pendientes</div></div>
    </div>
    <div style="margin-top:10px;text-align:center;font-family:'Barlow Condensed';font-size:14px;color:var(--muted);">
      Total km declarados: <b style="color:var(--accent);">${totalKm.toLocaleString('es-AR')}</b>
    </div>
  </div>`);

  const filtrosCard=el(`<div class="card">
    <div class="field" style="margin-bottom:8px;"><label>Filtrar por chofer</label><select id="sel-chofer"></select></div>
    <div class="field" style="margin-bottom:10px;"><label>Filtrar por estado</label><select id="sel-estado">
      <option value="todos">Todos los estados</option>
      <option value="pendiente">⏳ Pendientes</option>
      <option value="aprobado">✅ Aprobados</option>
      <option value="rechazado">❌ Rechazados</option>
    </select></div>
    <div class="row">
      <button class="btn secondary small" id="bl">Limpiar filtros</button>
      <button class="btn small" id="bx">⬇ Excel</button>
    </div>
  </div>`);
  const selC=filtrosCard.querySelector('#sel-chofer');
  selC.appendChild(el('<option value="">Todos los choferes</option>'));
  [...new Map(state.viajes.map(v=>[v.choferId,v.choferNombre])).entries()].forEach(([id,nombre])=>{
    const o=el(`<option value="${id}">${esc(nombre)}</option>`);
    if(id===state.filtroChofer)o.selected=true; selC.appendChild(o);
  });
  selC.onchange=()=>setState({filtroChofer:selC.value});
  const selE=filtrosCard.querySelector('#sel-estado');
  selE.value=state.filtroEstado;
  selE.onchange=()=>setState({filtroEstado:selE.value});
  filtrosCard.querySelector('#bl').onclick=()=>setState({filtroChofer:'',filtroEstado:'todos'});

  const listCard=el(`<div class="card"><h2>Registros</h2><div id="lv" style="margin-top:10px;"></div></div>`);
  const lv=listCard.querySelector('#lv');
  if(!filtrados.length) lv.appendChild(el('<div class="empty">No hay viajes para mostrar.</div>'));
  else filtrados.forEach(v=>{
    const kmDiferente=v.kmAprobados&&Number(v.kmAprobados)!==Number(v.km);
    const kmHtml=v.estado==='aprobado'&&kmDiferente
      ?`<span class="km nums" style="color:var(--good);">${v.kmAprobados} km <span style="font-size:12px;color:var(--muted);text-decoration:line-through;">${v.km}</span></span>`
      :`<span class="km nums">${v.km} km</span>`;
    const jtHtml=v.observacionJT?`<div class="jt-obs ${v.estado}">${esc(v.observacionJT)}</div>`:'';
    const tc=el(`<div class="trip-card">
      <div class="top"><span class="route">${esc(v.origen)} → ${esc(v.destino)}</span>${kmHtml}</div>
      <div class="meta">${fmtFecha(v.fecha)} · ${esc(v.choferNombre)} ${v.patente?'· '+esc(v.patente):''}</div>
      <div class="badges" style="margin-top:6px;">
        <span class="badge ${v.estado}">${{pendiente:'⏳ Pendiente',aprobado:'✅ Aprobado',rechazado:'❌ Rechazado'}[v.estado]||v.estado}</span>
        <span class="badge ${v.tipoViaje}">${v.tipoViaje==='ida'?'⬆ Ida':'⬇ Vuelta'}</span>
        <span class="badge ${v.tipoCarga}">${v.tipoCarga==='peligrosa'?'⚠ Peligrosa':'📦 General'}</span>
      </div>
      ${v.observaciones?`<div class="obs">${esc(v.observaciones)}</div>`:''}
      ${jtHtml}
      <div style="margin-top:8px;text-align:right;"><button class="icon-btn" title="Eliminar">🗑</button></div>
    </div>`);
    tc.querySelector('.icon-btn').onclick=()=>adminEliminarViaje(v.id);
    lv.appendChild(tc);
  });

  const frag=document.createDocumentFragment();
  frag.appendChild(statsCard); frag.appendChild(filtrosCard); frag.appendChild(listCard);
  return frag;
}

function renderAdminChoferes(){
  const card=el(`<div class="card">
    <div class="row" style="align-items:center;margin-bottom:14px;">
      <h2 style="flex:1;">Choferes</h2>
      <button class="btn small" id="bn">+ Agregar</button>
    </div>
    <div id="lc"></div>
  </div>`);
  card.querySelector('#bn').onclick=abrirModalAgregarChofer;
  const lc=card.querySelector('#lc');
  if(!state.choferesAdmin.length) lc.appendChild(el('<div class="empty">No hay choferes. Agregá el primero.</div>'));
  else state.choferesAdmin.forEach(c=>{
    const row=el(`<div class="chofer-row ${c.activo?'':'inactivo'}">
      <div>
        <div class="name">${esc(c.nombre)}</div>
        <div class="plate">${esc(c.patente||'Sin patente')} ${c.activo?'':'· Dado de baja'}</div>
      </div>
      <div class="acts">
        <button class="icon-btn" title="Editar">✎</button>
        <button class="icon-btn" title="Resetear PIN">🔑</button>
        <button class="icon-btn" title="${c.activo?'Dar de baja':'Reactivar'}">${c.activo?'⏸':'▶'}</button>
        <button class="icon-btn" title="Eliminar">🗑</button>
      </div>
    </div>`);
    const [eB,pB,tB,dB]=row.querySelectorAll('.icon-btn');
    eB.onclick=()=>abrirModalEditarChofer(c);
    pB.onclick=()=>adminResetearPin(c);
    tB.onclick=()=>adminToggleChofer(c);
    dB.onclick=()=>adminEliminarChofer(c);
    lc.appendChild(row);
  });
  return card;
}

/* ---- MODAL ---- */
function renderModal(){
  const bg=el('<div class="modal-bg"></div>');
  const modal=el(`<div class="modal"><h2 style="margin-bottom:14px;">${esc(state.modal.title)}</h2><div id="mb"></div><div class="row" id="ma" style="margin-top:18px;"></div></div>`);
  modal.querySelector('#mb').innerHTML=state.modal.body;
  const ma=modal.querySelector('#ma');
  state.modal.actions.forEach(a=>{
    const b=el(`<button class="btn ${a.cls}">${esc(a.label)}</button>`);
    b.onclick=a.onClick; ma.appendChild(b);
  });
  bg.appendChild(modal);
  bg.onclick=e=>{if(e.target===bg)cerrarModal();};
  return bg;
}

/* ============================================================
   ARRANCAR
   ============================================================ */
render();
</script>
</body>
